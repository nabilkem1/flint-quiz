# Release pipeline (T2/T3/T5/T6 — TASK-175 / TASK-167 / TASK-130).
#
# Runs only on release tags (`v*`) and on a nightly cron. Adds:
#   * Full smoke matrix (TEST-003/004/005).
#   * Per-language Foundry Evaluation (TEST-011 / TASK-167).
#   * Adversarial injection corpus (TEST-023 / TASK-181).
#   * Prompt-hash stability (TEST-025).
#   * Pre-public exposure gate (007 TASK-130) — refuses to tag
#     `public-ready` unless every PR + merge pipeline test is green
#     AND the manual signoffs in `docs/pre-public-gate.md` are
#     recorded.
#
# `tools/pre_public_gate.py` is the load-bearing release script; it
# parses the gate doc and refuses to proceed if any item is missing.

name: ci-release

on:
  push:
    tags: ["v*"]
  schedule:
    - cron: "13 4 * * *"   # 04:13 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-tests:
    name: Release tier (T2/T3/T5/T6)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # ------------------------------------------------------------------
      # Full in-process smoke matrix (TEST-003/004/005).
      # ------------------------------------------------------------------
      - name: TEST-003 / TEST-004 / TEST-005 — smoke matrix
        run: pytest tests/smoke -v

      # ------------------------------------------------------------------
      # TEST-011 — per-language correctness gate (per-language only blocks).
      # ------------------------------------------------------------------
      - name: TEST-011 — per-language Foundry Evaluation gate
        run: pytest tests/eval -v

      # ------------------------------------------------------------------
      # TEST-023 — injection corpus (plain + base64 + rot13 + leet × lang).
      # ------------------------------------------------------------------
      - name: TEST-023 — adversarial injection corpus
        run: pytest tests/test_injection_corpus.py tests/test_prompt_injection.py -v

      # ------------------------------------------------------------------
      # TEST-025 — prompt-hash stability + P0 mismatch path.
      # ------------------------------------------------------------------
      - name: TEST-025 — prompt-hash stability
        run: pytest tests/test_prompt_hash.py tests/integration/test_prompt_hash_verification.py -v

      # ------------------------------------------------------------------
      # TEST-028 — GDPR right-to-erasure cascade.
      # ------------------------------------------------------------------
      - name: TEST-028 — GDPR erasure cascade
        run: pytest tests/test_gdpr_erasure.py tests/integration/test_gdpr_erasure.py -v

      # ------------------------------------------------------------------
      # Pre-public exposure gate (007 TASK-130 / TASK-209).
      # ------------------------------------------------------------------
      - name: Pre-public exposure gate
        if: contains(github.ref_name, 'public-ready')
        run: python tools/pre_public_gate.py --checklist docs/pre-public-gate.md --env prod
