# Release-gate workflow (TASK-208 + TASK-209).
#
# Fires on every release tag (`v*`). Adds the **gate** on top of the
# release-tier test matrix from `ci-release.yml`:
#
#   * TASK-208 per-release quality gate — rejects the tag if any
#     PR-tier + merge-tier test fails OR TEST-006 fails in any
#     language OR TEST-011 fails per-language eval parity tolerance.
#
#   * TASK-209 pre-public exposure gate — fires only on tags
#     containing the substring `public-ready`. Parses
#     `docs/pre-public-gate.md` and refuses to proceed unless every
#     check-list item is `- [x]`. Cannot be bypassed (no `--force`
#     flag — FORBIDDEN ACTIONS).
#
# This workflow is **distinct** from `ci-release.yml`: that file runs
# the test surface; this one runs the gates that READ those test
# results.

name: release-gate

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  per-release-gate:
    name: Per-release quality gate (TASK-208)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: TEST-006 — no answer leakage (every language)
        run: pytest tests/test_no_answer_leakage.py tests/test_prompt_injection.py tests/test_injection_corpus.py -q

      - name: TEST-011 — per-language Foundry Evaluation gate
        run: pytest tests/eval -v

      - name: Full unit + integration + smoke tier
        run: |
          pytest tests/unit tests/integration tests/smoke -q \
            --ignore=tests/integration/test_audit_archive.py \
            --ignore=tests/integration/test_sweeper.py

      - name: Release-gate dry-run verification
        run: pytest tests/release/test_release_gate.py -q

  pre-public-gate:
    name: Pre-public exposure gate (TASK-209)
    runs-on: ubuntu-latest
    needs: per-release-gate
    if: contains(github.ref_name, 'public-ready')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Pre-public-check (docs/pre-public-gate.md)
        run: |
          python tools/pre_public_gate.py \
            --checklist docs/pre-public-gate.md \
            --env prod

      - name: Pre-public-gate dry-run verification
        run: pytest tests/release/test_pre_public_gate.py -q
