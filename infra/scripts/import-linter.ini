# import-linter rules for the answer-key boundary (TASK-125 / ADR-005).
#
# This file augments the contracts in `pyproject.toml`. It is the
# **layout-level** enforcement of the SEC-002 rule:
#
#   "Only `submit_answer` in `src/agent/tools.py` may reference
#    `get_answer_key`."
#
# The Python-side AST check lives in
# `tests/integration/test_question_search.py::test_get_answer_key_only_referenced_inside_submit_answer`.
# `import-linter` can enforce **module-level** import constraints but
# cannot grep inside a function body. The two layers are intentionally
# complementary; this config locks the module-level surface, the AST
# check locks the function-scoped surface.
#
# Usage: `python -m importlinter --config infra/scripts/import-linter.ini`.
# Wired into CI via the security workflow.

[importlinter]
root_package = src

# ---------------------------------------------------------------------------
# Contract 1 — Tool bodies are reachable only through the dispatcher.
# (Already declared in `pyproject.toml`; mirrored here for the
# stand-alone CLI invocation that this config supports.)
# ---------------------------------------------------------------------------
[importlinter:contract:1]
name = Tool bodies are reachable only through the dispatcher
type = forbidden
source_modules =
    src.agent.quiz_agent
    src.agent.resumption
    src.agent.agent_thread
    src.agent.language_detection
forbidden_modules =
    src.agent.tools

# ---------------------------------------------------------------------------
# Contract 2 — The answer-key channel is reachable only from
# `src/agent/tools.py` (and within that file, only from `submit_answer`
# — the AST check enforces the function-level rule).
#
# `src.data.question_search` exposes `get_answer_key` on
# `QuestionSearch`. No other module is allowed to import it: not the
# voice runtime, not the resumption helper, not the dispatcher, and
# definitely not the seed / sweeper paths.
# ---------------------------------------------------------------------------
[importlinter:contract:2]
name = `src.data.question_search` answer-key path forbidden outside `src.agent.tools`
type = forbidden
source_modules =
    src.agent.quiz_agent
    src.agent.resumption
    src.agent.agent_thread
    src.agent.dispatcher
    src.agent.language_detection
    src.agent.answer_normalizer
    src.agent.coverage_fallback
    src.agent.defensive_strip
    src.agent.timers
    src.agent.tts_shaper
    src.voice.realtime_runtime
    src.voice.stt_pipeline
    src.voice.tts_pipeline
    src.voice.idle_handler
    src.voice.session_cap
    src.seed.seed_index
    src.seed.reconcile_topics
    src.sweeper.function_app
forbidden_modules =
    src.data.question_search

# ---------------------------------------------------------------------------
# Contract 3 — The Cosmos repository is reachable only from the agent
# tool layer + erasure cascade + sweeper. Anything else is a layering
# violation (e.g., voice runtime reaching into Cosmos directly would
# bypass the tool boundary).
# ---------------------------------------------------------------------------
[importlinter:contract:3]
name = Cosmos repository forbidden from voice + dispatcher modules
type = forbidden
source_modules =
    src.voice.realtime_runtime
    src.voice.stt_pipeline
    src.voice.tts_pipeline
    src.voice.idle_handler
    src.voice.session_cap
    src.agent.dispatcher
    src.agent.answer_normalizer
    src.agent.coverage_fallback
    src.agent.defensive_strip
    src.agent.timers
    src.agent.tts_shaper
forbidden_modules =
    src.data.cosmos_repository
